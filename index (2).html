<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>culturecode</title>
<meta name="description" content="A global consumer entertainment company connecting content IP, fandom, and commerce." />
<meta property="og:title" content="culturecode" />
<meta property="og:description" content="For the real ones." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" type="image/png" href="logo.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --muted: rgba(10, 10, 10, 0.55);
    --line: rgba(10, 10, 10, 0.1);
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─────────────────────────────────────── */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 20px 28px;
  }

  .lang-toggle {
    display: flex;
    align-items: center;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 6px 8px;
    cursor: pointer;
    font: inherit;
    transition: color 0.18s ease;
  }
  .lang-toggle button.active { color: var(--fg); }
  .lang-toggle button:hover { color: var(--fg); }
  .lang-toggle .sep { color: var(--line); padding: 0 2px; }

  /* ─── PAGE ────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 28px 60px;
  }

  .page {
    max-width: 720px;
    width: 100%;
    text-align: center;
  }

  /* Centered logo at top — matching sound.xyz scale */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    margin-bottom: 120px;
  }

  .logo {
    height: 38px;
    width: auto;
    display: block;
    user-select: none;
  }

  /* Headline — left-aligned, bold, sound.xyz style */
  h1.headline {
    font-size: clamp(34px, 5.6vw, 56px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.025em;
    margin-bottom: 36px;
    color: var(--fg);
  }

  /* Body paragraph */
  .body-copy {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.65;
    letter-spacing: 0.005em;
    color: var(--fg);
    margin-bottom: 48px;
  }

  /* contact */
  .cta {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--fg);
    text-decoration: none;
    padding-bottom: 3px;
    border-bottom: 1px solid var(--fg);
    transition: opacity 0.18s ease;
    display: inline-block;
  }
  .cta:hover { opacity: 0.55; }

  /* ─── FOOTER ──────────────────────────────────────── */
  footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 40px 28px 36px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .ig-link {
    color: var(--fg);
    opacity: 0.85;
    transition: opacity 0.18s ease, transform 0.18s ease;
    display: inline-flex;
  }
  .ig-link:hover { opacity: 1; transform: translateY(-1px); }
  .ig-link svg { width: 22px; height: 22px; display: block; }

  .copy { font-size: 11px; color: var(--muted); }

  /* ─── REVEAL ─────────────────────────────────────── */
  .reveal {
    opacity: 0;
    transform: translateY(8px);
    animation: reveal 0.7s ease forwards;
  }
  .reveal.d1 { animation-delay: 0.05s; }
  .reveal.d2 { animation-delay: 0.18s; }
  .reveal.d3 { animation-delay: 0.32s; }
  .reveal.d4 { animation-delay: 0.46s; }
  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── MOBILE ──────────────────────────────────────── */
  @media (max-width: 640px) {
    .top-bar { padding: 16px 20px; }
    main { padding: 24px 22px 40px; }
    .logo-wrap { margin-top: 20px; margin-bottom: 80px; }
    .logo { height: 30px; }
    h1.headline { margin-bottom: 28px; }
    .body-copy { font-size: 16px; margin-bottom: 40px; }
    footer { padding: 32px 20px 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <nav class="lang-toggle reveal d1" aria-label="Language">
    <button id="lang-en" class="active" data-lang="en" aria-pressed="true">EN</button>
    <span class="sep">/</span>
    <button id="lang-ko" data-lang="ko" aria-pressed="false">KOR</button>
  </nav>
</div>

<main>
  <div class="page">
    <div class="logo-wrap reveal d1">
      <img class="logo" src="logo.png" alt="culturecode" />
    </div>

    <h1 class="headline reveal d2" data-i18n="headline">For the real ones.</h1>

    <p class="body-copy reveal d3" data-i18n="body">
      CultureCode Inc. is a global consumer entertainment company. We connect content IP, fandom, and commerce.
    </p>

    <a class="cta reveal d4" id="contact-btn" href="mailto:hello@culturecode.co.kr?subject=Inquiry%20%E2%80%94%20culturecode" data-i18n="cta">
      Get in touch
    </a>
  </div>
</main>

<footer>
  <a class="ig-link reveal d4" href="https://www.instagram.com/culturecode.official" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
      <circle cx="12" cy="12" r="4"></circle>
      <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
    </svg>
  </a>
  <div class="copy reveal d4">© <span id="year"></span> CultureCode, Inc.</div>
</footer>

<script>
  const i18n = {
    en: {
      title: 'culturecode',
      headline: 'For the real ones.',
      body: 'CultureCode Inc. is a global consumer entertainment company. We connect content IP, fandom, and commerce.',
      cta: 'Get in touch',
      mailSubject: 'Inquiry — culturecode'
    },
    ko: {
      title: '컬처코드',
      headline: '진짜를 위한 곳.',
      body: '컬처코드는 글로벌 컨슈머 엔터테인먼트 컴퍼니입니다. 우리는 콘텐츠 IP, 팬덤, 커머스를 연결합니다.',
      cta: '문의하기',
      mailSubject: '문의 — 컬처코드'
    }
  };

  function setLang(lang) {
    const dict = i18n[lang];
    document.documentElement.lang = lang === 'ko' ? 'ko' : 'en';
    document.title = dict.title;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (dict[key] !== undefined) el.textContent = dict[key];
    });

    document.getElementById('contact-btn').setAttribute(
      'href',
      'mailto:hello@culturecode.co.kr?subject=' + encodeURIComponent(dict.mailSubject)
    );

    document.querySelectorAll('.lang-toggle button').forEach(b => {
      const isActive = b.dataset.lang === lang;
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
    });

    try { localStorage.setItem('cc-lang', lang); } catch (e) {}
  }

  document.querySelectorAll('.lang-toggle button').forEach(b => {
    b.addEventListener('click', () => setLang(b.dataset.lang));
  });

  let initial = 'en';
  try {
    const saved = localStorage.getItem('cc-lang');
    if (saved === 'en' || saved === 'ko') initial = saved;
    else if (navigator.language && navigator.language.toLowerCase().startsWith('ko')) initial = 'ko';
  } catch (e) {}
  setLang(initial);

  document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
